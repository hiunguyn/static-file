<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eecf7a"/>
      <stop offset=".4" stop-color="#d4a84b"/>
      <stop offset=".75" stop-color="#b8893a"/>
      <stop offset="1" stop-color="#7a5a1e"/>
    </linearGradient>
    <radialGradient id="b" cx=".35" cy=".35" r=".65">
      <stop offset="0" stop-color="#f5f5f0"/>
      <stop offset=".5" stop-color="#d8d4cc"/>
      <stop offset="1" stop-color="#9a9690"/>
    </radialGradient>
    <radialGradient id="s" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#030305"/>
      <stop offset=".8" stop-color="#030305" stop-opacity=".8"/>
      <stop offset="1" stop-color="#030305" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Nền tối bo góc -->
  <rect width="64" height="64" rx="14" ry="14" fill="#0a0a0e"/>
  <!-- Viền vàng -->
  <rect width="60" height="60" x="2" y="2" rx="12" ry="12" fill="none" stroke="url(#g)" stroke-width="1.5" opacity=".6"/>
  <!-- Bóng billiard -->
  <circle cx="32" cy="32" r="20" fill="url(#b)"/>
  <circle cx="32" cy="32" r="20" fill="url(#s)"/>
  <!-- Số 8 -->
  <text x="32" y="37" text-anchor="middle" font-family="Montserrat,Arial,sans-serif" font-size="20" font-weight="800" fill="#f5f5f0">8</text>
</svg>
